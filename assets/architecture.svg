<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="brandSoft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="regGlow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#46506a"/>
    </marker>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" fill-opacity="0.03"/>
    </pattern>
  </defs>

  <rect width="1280" height="560" fill="#0b0d12"/>
  <rect width="1280" height="560" fill="url(#dots)"/>
  <text x="64" y="58" font-size="15" fill="#7e8799" letter-spacing="4">ARCHITECTURE</text>

  <!-- lane labels -->
  <text x="288" y="116" font-size="13" fill="#6ee7b7" letter-spacing="2" font-weight="600">SKILL MODE — DEFAULT</text>
  <text x="288" y="476" font-size="13" fill="#67e8f9" letter-spacing="2" font-weight="600">MCP MODE — OPTIONAL</text>

  <!-- connectors -->
  <g fill="none" stroke="#46506a" stroke-width="2">
    <path d="M198 290 C 244 290, 246 186, 288 186" marker-end="url(#arrow)"/>
    <path d="M198 290 C 244 290, 246 398, 288 398" marker-end="url(#arrow)"/>
    <path d="M478 186 L 552 186" marker-end="url(#arrow)"/>
    <path d="M478 398 L 552 398" marker-end="url(#arrow)"/>
    <path d="M760 186 C 802 186, 804 256, 842 256" marker-end="url(#arrow)"/>
    <path d="M760 398 C 802 398, 804 324, 842 324" marker-end="url(#arrow)"/>
    <path d="M1074 264 C 1096 264, 1100 190, 1116 190" marker-end="url(#arrow)"/>
    <path d="M1074 290 C 1098 290, 1100 282, 1116 282" marker-end="url(#arrow)"/>
    <path d="M1074 316 C 1096 316, 1100 374, 1116 374" marker-end="url(#arrow)"/>
  </g>

  <!-- Claude -->
  <g>
    <rect x="48" y="250" width="150" height="80" rx="14" fill="#141923" stroke="#2dd4bf" stroke-opacity="0.5" stroke-width="1.5"/>
    <text x="123" y="288" font-size="18" font-weight="700" fill="#e8eaed" text-anchor="middle">Claude</text>
    <text x="123" y="308" font-size="12" fill="#8a93a6" text-anchor="middle">Code · Desktop · API</text>
  </g>

  <!-- Skill lane -->
  <g>
    <rect x="288" y="150" width="190" height="72" rx="12" fill="#141923" stroke="#232a36"/>
    <text x="383" y="182" font-size="15" font-weight="600" fill="#e8eaed" text-anchor="middle">visual-creation</text>
    <text x="383" y="202" font-size="12" fill="#8a93a6" text-anchor="middle">Skill (prompt crafting)</text>

    <rect x="552" y="150" width="208" height="72" rx="12" fill="#141923" stroke="#232a36"/>
    <text x="656" y="182" font-size="15" font-weight="600" fill="#e8eaed" text-anchor="middle">cli.bundle.js</text>
    <text x="656" y="202" font-size="12" fill="#8a93a6" text-anchor="middle">single file · no MCP overhead</text>
  </g>

  <!-- MCP lane -->
  <g>
    <rect x="288" y="362" width="190" height="72" rx="12" fill="#141923" stroke="#232a36"/>
    <text x="383" y="394" font-size="15" font-weight="600" fill="#e8eaed" text-anchor="middle">create_asset</text>
    <text x="383" y="414" font-size="12" fill="#8a93a6" text-anchor="middle">server: creative-pipeline</text>

    <rect x="552" y="362" width="208" height="72" rx="12" fill="#141923" stroke="#232a36"/>
    <text x="656" y="394" font-size="15" font-weight="600" fill="#e8eaed" text-anchor="middle">mcp.bundle.js</text>
    <text x="656" y="414" font-size="12" fill="#8a93a6" text-anchor="middle">stdio MCP transport</text>
  </g>

  <!-- Registry -->
  <g>
    <circle cx="958" cy="290" r="150" fill="url(#regGlow)"/>
    <rect x="842" y="214" width="232" height="152" rx="16" fill="#151a24" stroke="url(#brandSoft)" stroke-width="2"/>
    <text x="958" y="258" font-size="17" font-weight="700" fill="#e8eaed" text-anchor="middle">Provider Registry</text>
    <text x="958" y="286" font-size="13" fill="#c4b5fd" text-anchor="middle">capability matrix</text>
    <text x="958" y="308" font-size="13" fill="#67e8f9" text-anchor="middle">automatic fallback</text>
    <text x="958" y="338" font-size="12" fill="#8a93a6" text-anchor="middle">best provider per job</text>
  </g>

  <!-- Providers -->
  <g font-size="14" font-weight="600">
    <rect x="1116" y="160" width="120" height="60" rx="11" fill="#11151d" stroke="#232a36"/>
    <text x="1176" y="188" fill="#e8eaed" text-anchor="middle">Gemini</text>
    <text x="1176" y="206" font-size="11" font-weight="400" fill="#8a93a6" text-anchor="middle">edit · refs</text>

    <rect x="1116" y="252" width="120" height="60" rx="11" fill="#11151d" stroke="#232a36"/>
    <text x="1176" y="280" fill="#e8eaed" text-anchor="middle">OpenAI</text>
    <text x="1176" y="298" font-size="11" font-weight="400" fill="#8a93a6" text-anchor="middle">typography</text>

    <rect x="1116" y="344" width="120" height="60" rx="11" fill="#11151d" stroke="#232a36"/>
    <text x="1176" y="372" fill="#e8eaed" text-anchor="middle">FLUX · HF</text>
    <text x="1176" y="390" font-size="11" font-weight="400" fill="#8a93a6" text-anchor="middle">free · fast</text>
  </g>
</svg>
